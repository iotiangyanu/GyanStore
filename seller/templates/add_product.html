{% extends 'layout.html' %}
{% block title %}
{% endblock %}

{% block content %}
{% load static %}


<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h4>Add New Product</h4>
        </div>
        <div class="card-body">
            <form method="POST" enctype="multipart/form-data"> {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Product Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" id="categorySelect" onchange="toggleCustomCategory()">
                        <option value="">-- Select a category --</option>
                        {% for category in categories %}
                            <option value="{{ category.name }}">{{ category.name }}</option>
                        {% endfor %}
                        <option value="custom">-- Add New Category --</option>
                    </select>
                    <input type="text" name="custom_category" class="form-control mt-2" id="customCategoryInput" placeholder="Enter new category name" style="display: none;">
                </div>

                <div class="mb-3">
                    <label class="form-label">Price</label>
                    <input type="number" step="0.01" name="price" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" name="stock" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="4"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label">Product Image</label>
                    <input type="file" name="image" class="form-control">
                    <small class="text-muted">Or upload an image file</small>
                </div>

                <div class="mb-3">
                    <label class="form-label">Image URL (Alternative)</label>
                    <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
                    <small class="text-muted">Paste an image URL instead of uploading. Leave blank if using file upload above.</small>
                </div>

                <button type="submit" class="btn btn-success">
                    Save Product 
                </button>

                <button type="button" onclick="history.back()" class="btn btn-secondary">
                    Cancel
                </button>
            </form>
        </div>
    </div>
</div>


{% endblock %}
