{% extends 'layout.html' %}

{% block title %}
Seller Registration
{% endblock %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow-lg border-0">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4">
                        Create Seller Account
                    </h3>

                    {% if messages %}
                        <div class="alert alert-danger">
                            {% for message in messages %}
                                {{ message }}
                            {% endfor %}
                        </div>
                    {% endif %}

                    <form method="post">
                        {% csrf_token %}
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label"> Company Name</label>
                                <input type='text' name='company_name'class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                            </div>
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label">username</label>
                                <input type="text" name='username' class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                                
                            </div>
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label"> First name</label>
                                <input type="text" name='first_name' class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                                
                            </div>
                            <div class="mb-3">
                                <label for="exampleInputEmail1" class="form-label"> Last Name</label>
                                <input type="text" name='last_name' class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" required>
                        
                            </div>
                            <div class="mb-3">
                                <label for="exampleInputPassword1" class="form-label">Password</label>
                                <input type="password" name='password' class="form-control" id="exampleInputPassword1">
                            </div>
                            <button type="submit" class="btn btn-primary" >Register</button>

                            <button type="button" onclick="history.back()" class="btn btn-secondary">
                            Cancel
                        </button>                
                    </form>

                    <hr>

                    <p class="text-center">
                        Already have an account?
                        <a href="{% url 'login' %}">Login here</a>
                    </p>

                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
